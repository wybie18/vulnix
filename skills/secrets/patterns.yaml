---
name: secrets_patterns
description: 'Strict composite match heuristics for detecting exposed keys and tokens.'
cwe: [CWE-798, CWE-312, CWE-319]
rules:
  - id: AWS-001
    description: "AWS Access Key ID hardcoded in variables"
    severity: CRITICAL
    match: 
      - "(?i)(aws_access_key_id|aws_access_key).*(AKIA[0-9A-Z]{16})"
    never_accept: "Returning the full unredacted AKIA key in the final report output."
    always_require: "Verification that the file is not a mocked AWS setup document inside a 'test/' folder."
  
  - id: STRIPE-001
    description: "Stripe Standard Restricted/Secret API Keys"
    severity: CRITICAL
    match:
      - "(?i)(stripe).*(sk_live_[0-9a-zA-Z]{24})"
      - "(?i)(stripe).*(rk_live_[0-9a-zA-Z]{24})"
    never_accept: "Flagging 'pk_live_' or 'pk_test_' (Publishable Keys) as a Critical vulnerability. They are meant to be public."
    always_require: "Identifying the precise module initializing the Stripe client to map the blast radius."

  - id: GENERIC-001
    description: "High Entropy Bearer or Authorization Tokens"
    severity: HIGH
    match:
      - "(?i)(bearer\s+[A-Za-z0-9\-\._~\+\/]+=*)"
      - "(?i)(api_key|token|client_secret|auth_token)\s*[:=]\s*['\"][A-Za-z0-9\-\._~\+\/]{20,}['\"]"
    never_accept: "Reporting strings that strictly contain a few English words (e.g., 'super_secret_dev_key') as high-entropy findings."
    always_require: "A strict Shannon entropy threshold validation indicating a randomly generated cryptographic key."
